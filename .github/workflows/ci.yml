name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    # Windows is in the matrix because it is where this actually runs. The README
    # starts with setx and Task Scheduler, the target ERPs are Logo Tiger, Netsis
    # and Mikro on SQL Server, and cli.py carries Windows-specific console
    # encoding code - all of which was tested exclusively on Linux. Windows is the
    # OS where paths, encodings and line endings break, so it gets one full leg.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (package + dev tools from pyproject)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: python -m ruff check erp_report_engine demo tests
      - name: Test (guard, contracts, calendar, render, MCP, end-to-end on demo DB)
        run: python -m pytest tests/ -q

  # Coverage runs once rather than per-leg: the number is a property of the test
  # suite, not of the interpreter. A project that says its guarantees are "forced
  # in code and covered by tests" should be able to say how much.
  #
  # The floor is the measured number, not an aspiration - its job is to stop the
  # number falling, not to be a target nobody hits. Note that cli.py, __main__.py
  # and logsetup.py report 0% and are NOT untested: test_cli.py drives them as a
  # SUBPROCESS, which this measurement cannot see. Real coverage is higher than
  # the total says. Do not "fix" that gap by deleting the CLI tests.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pytest-cov
      - name: Test with coverage, and fail under the floor
        run: python -m pytest tests/ -q --cov=erp_report_engine --cov-report=term-missing --cov-fail-under=80

  powerbi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: PBIR is generated, not hand-edited (no drift)
        run: |
          python "powerbi/tools/generate_report_pages.py"
          git diff --exit-code -- "powerbi/ERP Command Center.Report"
      - name: The published trust pages match a live guard run (no drift)
        run: |
          python docs/generate_trust_page.py
          python docs/generate_playground.py
          git diff --exit-code -- docs/trust.html docs/playground.html
      - name: The published canonical model matches the code (no drift)
        run: |
          python docs/generate_model_json.py
          git diff --exit-code -- docs/model.json
      - name: The trust-benchmark CLI passes (every attack refused)
        run: python -m erp_report_engine trust-benchmark

  wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Build the wheel and verify every bundled profile ships
        run: |
          python -m pip install build
          python -m build --wheel
          python - <<'PY'
          import glob, zipfile
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          for p in ("generic", "logo_tiger", "netsis", "mikro"):
              assert any(n.endswith(f"profiles/{p}.yaml") for n in names), f"{p}.yaml missing from the wheel"
          assert any(n.endswith("py.typed") for n in names), "py.typed missing - type hints won't reach installers"
          print("wheel bundles all profiles + py.typed:", whl)
          PY
