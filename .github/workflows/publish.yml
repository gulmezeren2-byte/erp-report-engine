name: Publish to PyPI

# Fires when you publish a GitHub Release. Uses PyPI Trusted Publishing (OIDC),
# so there is no API token to store — configure the trusted publisher once on
# PyPI (project: erp-report-engine, owner/repo, workflow: publish.yml,
# environment: pypi). See the README "Install" section.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # A PyPI release is irreversible - a version number can be yanked but never
  # reused - so the tests run here too rather than trusting that CI was green on
  # some earlier commit. This job is what `publish` waits on.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,mcp]"
      - run: ruff check .
      - run: python -m pytest -q
      - name: The release tag must match __version__
        run: |
          python - <<'PY'
          import os, re, pathlib, sys
          tag = os.environ["TAG"].lstrip("v")
          src = pathlib.Path("erp_report_engine/__init__.py").read_text(encoding="utf-8")
          ver = re.search(r'__version__ = "([^"]+)"', src).group(1)
          if tag != ver:
              sys.exit(f"release tag {tag!r} != __version__ {ver!r} - one of them is wrong")
          print(f"tag and __version__ agree: {ver}")
          PY
        env:
          TAG: ${{ github.event.release.tag_name }}

  publish:
    needs: [test]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write            # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: Check the artifacts PyPI will actually receive
        # catches a README that renders as an error page on PyPI - the landing
        # page for `pipx install erp-report-engine`
        run: python -m twine check --strict dist/*
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
