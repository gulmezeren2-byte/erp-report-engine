name: Publish to PyPI

# Fires when you publish a GitHub Release. Uses PyPI Trusted Publishing (OIDC),
# so there is no API token to store — configure the trusted publisher once on
# PyPI (project: erp-report-engine, owner/repo, workflow: publish.yml,
# environment: pypi). See the README "Install" section.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write            # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
