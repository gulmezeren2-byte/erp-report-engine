profile: generic
dialect: any
description: >
  Canonical demo schema - the shape every profile must map its ERP into.
  Used by the bundled demo database; also a template for writing new profiles.

# Optional declarative contract: expectations checked over the extracted data
# and reported in the same quality gate. severity 'fail' trips `run --strict`.
contract:
  orders:
    severity: warn
    not_null: [order_id, order_date, net_total]
    accepted_values:
      status: [open, shipped, delivered, closed, cancelled]
  order_lines:
    severity: warn
    relationships: {order_id: orders}   # every line must belong to an order in the window

entities:
  orders:
    query: |
      SELECT
        o.order_id,
        o.order_date,
        o.region,
        o.customer,
        o.status,
        o.promised_date,
        o.actual_ship_date,
        o.net_total
      FROM orders o
      WHERE o.order_date >= :since

  order_lines:
    query: |
      SELECT
        l.order_id,
        l.item_code,
        l.qty
      FROM order_lines l
      JOIN orders o ON o.order_id = l.order_id
      WHERE o.order_date >= :since

  inventory:
    query: |
      SELECT
        i.item_code,
        i.stock_qty
      FROM inventory i
