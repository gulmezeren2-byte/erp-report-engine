profile: logo_tiger
dialect: mssql
description: >
  Logo Tiger / GO (MSSQL) mapping contract. Logo stores data in firm- and
  period-suffixed tables: LG_{firm_no}_{period_no}_ORFICHE (order headers),
  LG_{firm_no}_{period_no}_STLINE (transaction lines), LG_{firm_no}_ITEMS
  (items), LG_{firm_no}_CLCARD (customers). Set firm_no / period_no in the
  config's profile_vars (e.g. "001" / "01").

  Field notes (verify against YOUR version - Logo schemas vary by release):
  - ORFICHE.TRCODE 1 = purchase order, 2 = sales order; we take sales.
  - ORFICHE.STATUS: 1 = open, 4 = closed (mapped to canonical status).
  - Dates are datetime; CAPIBLOCK_CREADEDDATE is creation, DATE_ is doc date.
  - NETTOTAL is the order net amount in local currency.
  - Ship/delivery dates typically come from the dispatch (irsaliye) linkage;
    this profile approximates with ORFICHE-level dates - refine per client.

  Optional receivables (cari yaslandirma) map from PAYTRANS - the standard AR
  aging table. It holds one row per payment-plan installment, so it buckets by
  due date naturally:
  - open_amount = TOTAL - PAID. There is NO closed flag on PAYTRANS; an
    installment is open while TOTAL - PAID > 0.
  - Filters: MODULENR = 4 (Fatura), TRCODE IN (7,8,9) (retail/wholesale sale and
    service = the sales/AR side), SIGN = 0 (Borc/receivable). Confirm the TRCODE
    set covers your sales-invoice types before trusting the totals.
  - invoice_id comes from INVOICE.FICHENO via PAYTRANS.FICHEREF (correct because
    MODULENR = 4). Verify it is the number you want, or drop the join and use
    p.FICHEREF as a stable surrogate.
  - Opening balances / cari dekont are NOT MODULENR=4 and won't appear here.
  - PAYTRANS is per-period; to age across fiscal years UNION each period's table.

contract:
  receivables:
    severity: warn
    not_null: [due_date, open_amount]

entities:
  orders:
    query: |
      SELECT
        f.FICHENO                                   AS order_id,
        f.DATE_                                     AS order_date,
        COALESCE(sh.TOWNNAME, 'UNKNOWN')            AS region,
        c.DEFINITION_                               AS customer,
        CASE f.STATUS WHEN 4 THEN 'delivered' ELSE 'open' END AS status,
        f.DELIVERYDATE                              AS promised_date,
        f.SHIPMENTDATE                              AS actual_ship_date,
        f.NETTOTAL                                  AS net_total
      FROM LG_{firm_no}_{period_no}_ORFICHE f
      JOIN LG_{firm_no}_CLCARD c   ON c.LOGICALREF = f.CLIENTREF
      LEFT JOIN LG_{firm_no}_SHIPINFO sh ON sh.LOGICALREF = f.SHIPINFOREF
      WHERE f.TRCODE = 2
        AND f.DATE_ >= :since

  order_lines:
    query: |
      SELECT
        f.FICHENO   AS order_id,
        i.CODE      AS item_code,
        l.AMOUNT    AS qty
      FROM LG_{firm_no}_{period_no}_ORFLINE l
      JOIN LG_{firm_no}_{period_no}_ORFICHE f ON f.LOGICALREF = l.ORDFICHEREF
      JOIN LG_{firm_no}_ITEMS i               ON i.LOGICALREF = l.STOCKREF
      WHERE f.TRCODE = 2
        AND f.DATE_ >= :since
        AND l.LINETYPE = 0

  inventory:
    query: |
      SELECT
        i.CODE                       AS item_code,
        SUM(s.ONHAND)                AS stock_qty
      FROM LV_{firm_no}_{period_no}_STINVTOT s
      JOIN LG_{firm_no}_ITEMS i ON i.LOGICALREF = s.STOCKREF
      GROUP BY i.CODE

  # Optional: open customer receivables for aging (cari yaslandirma).
  receivables:
    query: |
      SELECT
        inv.FICHENO              AS invoice_id,
        c.DEFINITION_            AS customer,
        p.DATE_                  AS due_date,
        (p.TOTAL - p.PAID)       AS open_amount
      FROM LG_{firm_no}_{period_no}_PAYTRANS p
      JOIN LG_{firm_no}_CLCARD c                     ON c.LOGICALREF = p.CARDREF
      LEFT JOIN LG_{firm_no}_{period_no}_INVOICE inv ON inv.LOGICALREF = p.FICHEREF
      WHERE p.MODULENR = 4
        AND p.TRCODE IN (7, 8, 9)
        AND p.SIGN = 0
        AND p.CANCELLED = 0
        AND (p.TOTAL - p.PAID) > 0.005
