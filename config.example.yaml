# erp-report-engine configuration
# Copy to config.yaml, adjust, then:  python -m erp_report_engine validate -c config.yaml
#
# SECURITY: the connection URL (with credentials) lives in an ENVIRONMENT
# VARIABLE, never in this file. The loader refuses URLs with embedded
# passwords on purpose.

connection:
  url_env: ERP_DB_URL
  # Set the variable first, e.g. (Windows):
  #   setx ERP_DB_URL "mssql+pyodbc://readonly_user:PASS@SERVER/LOGODB?driver=ODBC+Driver+17+for+SQL+Server"
  # or (Linux/macOS):
  #   export ERP_DB_URL="postgresql+psycopg2://readonly_user:PASS@host/erp"
  # Use a READ-ONLY database login (db_datareader on MSSQL) - defense in depth.

profile: logo_tiger   # bundled name (logo_tiger | generic), or a path to your own YAML

profile_vars:                       # substituted into {placeholders} in the profile
  firm_no: "001"                    # identifier-safe values only (letters/digits/_)
  period_no: "01"

report:
  company_alias: "Company"          # display name in the report header - alias is fine
  lookback_weeks: 13                # extraction window (completed ISO weeks)
  low_cover_weeks: 2.0              # stock-cover alert threshold
  out_dir: reports
  state_db: state.db                # run memory (decline streaks)

limits:
  row_cap: 500000                   # refuse suspiciously large extractions
  query_timeout_s: 60               # per-statement timeout (MSSQL/PostgreSQL)

# Optional. Used only with `run --send`. Every secret (SMTP password, webhook
# URLs, the healthcheck URL) is read from an environment variable - never here.
# delivery:
#   email:
#     to: ["ops@company.com"]
#     from_addr: "reports@company.com"
#     host_env: ERP_SMTP_HOST       # host/port/user may be plain (non-secret)
#     port: 587
#     user_env: ERP_SMTP_USER
#     password_env: ERP_SMTP_PASSWORD   # password ONLY via env
#     starttls: true
#     subject: "Weekly ERP report {week}"
#   slack:
#     webhook_url_env: ERP_SLACK_WEBHOOK
#   teams:                          # Power Automate Workflows URL (connectors retired 2026)
#     webhook_url_env: ERP_TEAMS_WEBHOOK
#   power_automate:                 # custom flow: card + archive report (see automation/POWER-AUTOMATE.md)
#     webhook_url_env: ERP_POWER_AUTOMATE_URL
#     include_report: true          # send the HTML report (base64) so the flow can archive it
#   healthcheck:                    # healthchecks.io dead-man's-switch
#     ping_url_env: ERP_HEALTHCHECK_URL

# Optional. `run --narrate` adds an LLM executive summary built from AGGREGATES
# ONLY (never raw rows); the report prints the exact payload the model saw, so it
# can't hide what it was fed. Any OpenAI-compatible endpoint works, including a
# local, keyless server (Ollama / LM Studio). Without this block, --narrate no-ops.
# narrative:
#   api_base: https://api.openai.com/v1   # or http://localhost:11434/v1 (Ollama)
#   model: gpt-4o-mini
#   api_key_env: OPENAI_API_KEY           # omit for a local, keyless endpoint
#   timeout_s: 30
